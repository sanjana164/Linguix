<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linguix Translator</title>
  <style>
    body {
      background: #0b0b1f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 600px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
      padding: 10px;
    }

    select, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
    }

    .output {
      background: #111;
      padding: 15px;
      min-height: 120px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🌐 Linguix Translator</h2>

  <textarea id="text" placeholder="Type anything..."></textarea>

  <select id="src">
    <option value="auto">Auto Detect</option>
    <option value="en">English</option>
    <option value="hi">Hindi</option>
  </select>

  <select id="tgt">
    <option value="hi">Hindi</option>
    <option value="en">English</option>
  </select>

  <button onclick="translate()">Translate</button>

  <div class="output" id="output">Result will appear here...</div>
</div>

<script>
async function translate() {
  const text = document.getElementById("text").value;
  const src = document.getElementById("src").value;
  const tgt = document.getElementById("tgt").value;

  if (!text.trim()) return;

  try {
    const res = await fetch("http://localhost:5000/api/translate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: text,
        src_lang: src,
        tgt_lang: tgt
      })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById("output").innerText = "Error: " + data.error;
      return;
    }

    document.getElementById("output").innerText =
      "🌐 " + data.translated +
      "\n\n📝 English: " + data.english;

  } catch (err) {
    document.getElementById("output").innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
